name: Deploy React Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "16"

      - name: Install dependencies for app 1
        run: |
          cd app1
          npm install

      - name: Build app 1
        run: |
          cd app1
          npm run build

      - name: Install dependencies for app 2
        run: |
          cd app2
          npm install

      - name: Build app 2
        run: |
          cd app2
          npm run build

      - name: Deploy to server
        run: |
          # Lệnh deploy của bạn ở đây
          # Ví dụ: scp -r app1/build/* user@server:/path/to/app1
          #        scp -r app2/build/* user@server:/path/to/app2
