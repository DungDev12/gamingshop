name: Deploy Vite Projects

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: [client, admin]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.project }}
        run: npm run build:${{ matrix.project }}

      - name: Deploy ${{ matrix.project }}
        run: |
          if [ "${{ matrix.project }}" == "client" ]; then
            echo "Deploying client project"
            mkdir -p public/client
            cp -r dist/* public/client/
          elif [ "${{ matrix.project }}" == "admin" ]; then
            echo "Deploying admin project"
            mkdir -p public/admin
            cp -r dist/* public/admin/
          fi

      - name: Deploy to GitHub Pages
        if: ${{ matrix.project == 'admin' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
